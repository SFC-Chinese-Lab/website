    <style>
      .table-wrap {
        width: 100%;
        display: flex;
        justify-content: center;
        margin: 20px 0;
      }

      .schedule {
        border-collapse: collapse;
        table-layout: fixed;
        width: 1200px;
        /* 列幅固定: 6列=100pxずつ */
        text-align: center;
      }

      .schedule th,
      .schedule td {
        border: 1px solid #000;
        padding: 6px;
        vertical-align: middle;
      }

      .schedule thead th[colspan] {
        height: 40px;
      }

      .schedule th {
        width: 100px;
      }

      /* 空欄セル用 */
      .empty {
        background: #d9d9d9;
      }

      /* セル内に複数人の写真を横並びで配置 */
      .people {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        /* 写真の間隔 */
      }

      .people figure {
        margin: 0;
        text-align: center;
      }

      .people figcaption {
        font-size: 12px;
        line-height: 1.2;
        margin-top: 4px;
        white-space: nowrap;
      }

      /* 丸型アバター画像 */
      .avatar {
        width: 56px;
        height: 56px;
        /* ここを変えるとサイズ一括調整 */
        border-radius: 50%;
        object-fit: cover;
        object-position: center;
        display: block;
      }

      /* 名前だけ置くとき用（写真なし） */
      .name-only {
        display: inline-block;
        font-size: 14px;
      }

      /* スマホで少し縮めたい場合（任意） */
      @media (max-width: 1280px) {
        .schedule {
          width: 100%;
        }

        .schedule th {
          width: auto;
        }
      }
    </style>
